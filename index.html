<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- logo and title -->
    <title>English Janala | Easy to learn English</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />
    <!-- tailwind css and daisyui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font cdn -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- font awsome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- css link -->
    <link rel="stylesheet" href="/style/style.css" />
  </head>
  <body>
    <!-- header pirt -->
    <header>
      <!-- navbar -->
      <nav>
        <div class="navbar px-[1%] lg:px-[5%] bg-blue-50 shadow-sm p-3">
          <div class="navbar-start">
            <div>
              <a class="flex text-xl items-center font-semibold" href="#">
                <span>English</span>
                <img src="assets/logo.png" alt="logo" class="w-8 mr-2" />
                <span class="font-bangla">জানালা</span>
              </a>
            </div>
          </div>
          <div class="navbar-end flex gap-4">
            <a class="btn btn-outline btn-primary hidden lg:flex"><i class="fa-solid fa-circle-question"></i>FAQ</a>
            <a class="btn btn-outline btn-primary hidden lg:flex"><i class="fa-solid fa-book-open"></i>Learn</a>
            <a class="btn btn-outline btn-primary"><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>

            <div class="dropdown pr-2">
              <div tabindex="0" role="button" class="btn btn-ghost bg-primary text-white lg:hidden">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" />
                </svg>
              </div>
              <ul tabindex="-1" class="menu menu-lg dropdown-content bg-blue-50 rounded-box z-1 mt-5 w-52 p-2 shadow">
                <li>
                  <a class="hover:bg-blue-200"><i class="fa-solid fa-circle-question"></i>FAQ</a>
                </li>
                <li>
                  <a class="hover:bg-blue-200"><i class="fa-solid fa-book-open"></i>Learn</a>
                </li>
                <li>
                  <a class="hover:bg-blue-200"><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
    </header>
    <!-- hero section -->
    <section class="hero flex justify-between flex-col-reverse lg:flex-row items-center gap-10 px-[1%] lg:px-[5%] mt-10">
      <!-- hero left side -->
      <div>
        <h2 class="font-bold text-[60px]"><span class="text-[#00BCFF]">English</span> is Easy!!</h2>
        <p class="font-bangla font-medium text-[24px] text-[#26262ab8]">আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা <br> আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে <br>যাবে অন্য একটি Level এ</p>
        <form action="">
          <input type="text" placeholder="Enter you name">
          <input type="password" name="password" id="">
          <button type="submit">Submit</button>
        </form>
      </div>
      <!-- hero right side -->
       <div>
        <img src="./assets/hero-student.png" alt="">
       </div>
    </section>
  </body>
</html>
